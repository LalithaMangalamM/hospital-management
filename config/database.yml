default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "localhost" } %>
  port: <%= ENV.fetch("DB_PORT") { 5432 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>

development:
  <<: *default
  database: hospital_management_development

test:
  <<: *default
  database: hospital_management_test

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME") { "hospital_management_production" } %>
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *default
    database: hospital_management_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: hospital_management_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: hospital_management_production_cable
    migrations_paths: db/cable_migrate
